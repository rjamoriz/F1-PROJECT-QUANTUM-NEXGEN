# Quantum-Aero F1 Prototype - Docker Desktop Overrides
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.desktop.yml up --build -d

services:
  backend:
    environment:
      - BACKEND_PUBLIC_URL=${BACKEND_PUBLIC_URL:-http://localhost:3001}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000}

  ml-surrogate:
    build:
      context: ./services/ml-surrogate
      dockerfile: Dockerfile.cpu

  frontend-next:
    build:
      context: ./frontend-next
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://localhost:3001}
        NEXT_PUBLIC_BACKEND_WS_URL: ${NEXT_PUBLIC_BACKEND_WS_URL:-ws://localhost:3001}
        NEXT_PUBLIC_AUTH_AUTO_REFRESH: ${NEXT_PUBLIC_AUTH_AUTO_REFRESH:-true}
    container_name: qaero-frontend-next
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/"]
      interval: 20s
      timeout: 5s
      retries: 5
    networks:
      - qaero-network
